name: Score Submission

on:
  pull_request:
    paths:
      - "submissions/*.csv"

jobs:
  score:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - uses: actions/checkout@v3

      # 2️⃣ Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # 3️⃣ Install minimal dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn

      # 4️⃣ Create hidden ground truth CSV from secret
      - name: Create hidden test labels
        run: |
          echo "${{ secrets.TESTREAL }}" > data/ground_truth.csv
          echo "Ground truth first line:"
          head -1 data/ground_truth.csv

      # 5️⃣ Debug - list files
      - name: List files
        run: ls -la

      # 6️⃣ Run scoring for each submission CSV
      - name: Run scoring
        run: |
          echo "Files in submissions/:"
          ls submissions/
          for file in submissions/*.csv; do
            echo "Scoring $file"
            python scoring_script.py "$file" data/ground_truth.csv
          done

      # 7️⃣ Update leaderboard
      - name: Update leaderboard
        run: python update_leaderboard.py
      - name: Commit & push updated leaderboard
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add leaderboard.md
          git commit -m "Update leaderboard from workflow" || echo "No changes to commit"
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }} HEAD:${{ github.ref }}